<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEEM User Data Performance</title>
    <style>
        :root { --steem-blue: #1a508b; --steem-green: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .input-box { background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; gap: 10px; justify-content: center; align-items: center; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 220px; }
        button { background: var(--steem-blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--steem-blue); color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .fast { color: var(--steem-green); font-weight: bold; }
        .error { color: #e74c3c; }
        .title-cell { text-align: left; font-size: 0.9em; color: #444; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--steem-blue);">🔍 노드별 사용자 데이터 로딩 속도</h2>
    
    <div class="input-box">
        <label>ID 입력: @</label>
        <input type="text" id="targetId" value="talkit">
        <button onclick="runTest()">데이터 조회 속도 측정</button>
    </div>

    <table id="result-table">
        <thead>
            <tr>
                <th>노드 주소</th>
                <th>조회 속도</th>
                <th>상태</th>
                <th>최신 포스팅 제목</th>
            </tr>
        </thead>
        <tbody id="result-body">
            <tr><td colspan="4">측정 버튼을 눌러주세요.</td></tr>
        </tbody>
    </table>
</div>

<script>
    const NODE_LIST = [
        "https://api.steemit.com",
        "https://api.moecki.online",
        "https://rpc.amarbangla.net",
        "https://api.dlike.io",
        "https://api.justyy.com",
        "https://api.pennsif.net",
        "https://api.symbionts.io",
        "https://api.steem.house",
        "https://steemd.privex.io",
        "https://anyx.io"
    ];

    async function testNodePerformance(url, user) {
        const start = performance.now();
        const payload = {
            jsonrpc: "2.0",
            method: "condenser_api.get_discussions_by_author_before_date",
            params: [user, "", "2026-12-31T23:59:59", 1],
            id: 1
        };

        try {
            const res = await fetch(url, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'application/json' },
                signal: AbortSignal.timeout(7000)
            });
            const time = Math.round(performance.now() - start);
            const data = await res.json();
            const postTitle = (data.result && data.result.length > 0) ? data.result[0].title : "글 없음";
            return { url, time, status: '성공', title: postTitle, class: time < 600 ? 'fast' : '' };
        } catch (e) {
            return { url, time: 9999, status: '실패', title: '-', class: 'error' };
        }
    }

    async function runTest() {
        const user = document.getElementById('targetId').value.trim();
        const tbody = document.getElementById('result-body');
        tbody.innerHTML = '<tr><td colspan="4">모든 노드에 쿼리를 날리는 중...</td></tr>';

        const tests = NODE_LIST.map(url => testNodePerformance(url, user));
        const results = await Promise.all(tests);
        results.sort((a, b) => a.time - b.time);

        tbody.innerHTML = '';
        results.forEach(r => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${r.url}</strong></td>
                <td class="${r.class}">${r.time === 9999 ? '∞' : r.time + 'ms'}</td>
                <td>${r.status}</td>
                <td class="title-cell" title="${r.title}">${r.title}</td>
            `;
            tbody.appendChild(row);
        });
    }
</script>
</body>
</html>
