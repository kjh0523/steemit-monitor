<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEEM Node Performance - User Tracker</title>
    <style>
        :root {
            --steem-blue: #1a508b;
            --steem-green: #27ae60;
            --bg-color: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .setup-section { background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: flex; gap: 10px; align-items: center; justify-content: center; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 200px; font-size: 1rem; }
        button { background: var(--steem-blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #133a63; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--steem-blue); color: white; padding: 12px; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        
        .latency { font-weight: bold; }
        .fast { color: var(--steem-green); }
        .slow { color: #e67e22; }
        .error { color: #e74c3c; }
        .post-title { font-size: 0.85rem; color: #555; text-align: left; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--steem-blue);">🚀 STEEM 맞춤형 노드 성능 측정</h2>
    <p style="text-align: center; color: #666;">사용자 계정의 최신 포스트를 불러오는 속도를 측정합니다.</p>

    <div class="setup-section">
        <label for="username">계정 ID: @</label>
        <input type="text" id="username" value="talkit" placeholder="계정 입력">
        <button onclick="runDiagnostic()">성능 측정 시작</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>노드 엔드포인트</th>
                <th>응답 속도</th>
                <th>상태</th>
                <th>최신 포스트 제목</th>
            </tr>
        </thead>
        <tbody id="result-body">
            <tr><td colspan="4" style="color: #999;">아이디를 입력하고 측정 버튼을 눌러주세요.</td></tr>
        </tbody>
    </table>
</div>

<script>
    const NODES = [
        "https://api.steemit.com",
        "https://api.justyy.com",
        "https://api.steem.house",
        "https://steemd.privex.io",
        "https://anyx.io"
    ];

    async function fetchUserPost(nodeUrl, username) {
        const startTime = performance.now();
        const payload = {
            jsonrpc: "2.0",
            method: "condenser_api.get_discussions_by_author_before_date",
            params: [username, "", "2026-12-31T23:59:59", 1], // 최신 글 1건 요청
            id: 1
        };

        try {
            const response = await fetch(nodeUrl, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'application/json' },
                signal: AbortSignal.timeout(6000) // 6초 타임아웃
            });

            const duration = Math.round(performance.now() - startTime);
            const data = await response.json();
            
            if (data.result && data.result.length > 0) {
                return {
                    node: nodeUrl,
                    latency: duration,
                    status: 'OK',
                    title: data.result[0].title
                };
            } else {
                return { node: nodeUrl, latency: duration, status: 'No Post', title: '포스트 없음' };
            }
        } catch (e) {
            return { node: nodeUrl, latency: 9999, status: 'Error', title: '연결 실패' };
        }
    }

    async function runDiagnostic() {
        const username = document.getElementById('username').value.trim();
        if (!username) return alert("ID를 입력하세요!");

        const tbody = document.getElementById('result-body');
        tbody.innerHTML = '<tr><td colspan="4">각 노드에서 데이터를 가져오는 중...</td></tr>';

        // 모든 노드에 동시 요청
        const promises = NODES.map(node => fetchUserPost(node, username));
        const results = await Promise.all(promises);

        // 속도순 정렬
        results.sort((a, b) => a.latency - b.latency);

        tbody.innerHTML = '';
        results.forEach(res => {
            const isFast = res.latency < 600;
            const isError = res.status === 'Error';
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${res.node}</strong></td>
                <td class="latency ${isFast ? 'fast' : 'slow'}">${isError ? '∞' : res.latency + 'ms'}</td>
                <td><span style="color: ${isError ? 'red' : 'green'}">${res.status}</span></td>
                <td class="post-title" title="${res.title}">${res.title}</td>
            `;
            tbody.appendChild(row);
        });
    }
</script>

</body>
</html>
