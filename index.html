<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEEM RPC Node Monitor</title>
    <style>
        :root {
            --primary: #1a508b;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: var(--primary); color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }
        .online { background: #d4edda; color: var(--success); }
        .offline { background: #f8d7da; color: var(--danger); }
        .fast { color: var(--success); font-weight: bold; }
        
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1em; }
        button:hover { opacity: 0.9; }
        .copy-btn { padding: 4px 8px; font-size: 0.8em; background: #eee; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 STEEM 노드 상태 모니터</h1>
    <p>스팀잇이 느릴 때, 아래 리스트에서 가장 빠른 노드 주소를 복사하여 설정에서 변경하세요.</p>
    
    <table id="node-table">
        <thead>
            <tr>
                <th>노드 주소</th>
                <th>상태</th>
                <th>응답 속도</th>
                <th>현재 블록</th>
                <th>복사</th>
            </tr>
        </thead>
        <tbody id="node-list">
            </tbody>
    </table>
    
    <button onclick="checkAllNodes()">지금 다시 측정하기</button>
</div>

<script>
    const STEEM_NODES = [
        { name: "Steemit Official", url: "https://api.steemit.com" },
        { name: "Steemit Dev", url: "https://api.steemitdev.com" },
        { name: "Justyy (Asia)", url: "https://api.justyy.com" },
        { name: "Steem.house (gtg)", url: "https://api.steem.house" },
        { name: "Privex", url: "https://steemd.privex.io" },
        { name: "Anyx", url: "https://anyx.io" }
    ];

    async function checkNode(node) {
        const startTime = performance.now();
        const payload = {
            jsonrpc: "2.0",
            method: "condenser_api.get_dynamic_global_properties",
            params: [],
            id: 1
        };

        try {
            const response = await fetch(node.url, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'application/json' },
                signal: AbortSignal.timeout(5000) // 5초 타임아웃
            });

            const duration = Math.round(performance.now() - startTime);
            const data = await response.json();
            const blockNum = data.result.head_block_number.toLocaleString();

            return { 
                ...node, 
                status: 'Online', 
                latency: duration, 
                block: blockNum,
                class: 'online'
            };
        } catch (error) {
            return { 
                ...node, 
                status: 'Offline', 
                latency: '∞', 
                block: '-',
                class: 'offline'
            };
        }
    }

    async function checkAllNodes() {
        const listElement = document.getElementById('node-list');
        listElement.innerHTML = '<tr><td colspan="5">측정 중...</td></tr>';
        
        const results = await Promise.all(STEEM_NODES.map(node => checkNode(node)));
        
        // 속도순 정렬 (Online 우선, 그 다음 빠른 순)
        results.sort((a, b) => {
            if (a.status !== b.status) return a.status === 'Online' ? -1 : 1;
            return a.latency - b.latency;
        });

        listElement.innerHTML = '';
        results.forEach(res => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${res.url}</strong><br><small>${res.name}</small></td>
                <td><span class="status-badge ${res.class}">${res.status}</span></td>
                <td class="${res.latency < 500 ? 'fast' : ''}">${res.latency}ms</td>
                <td>${res.block}</td>
                <td><button class="copy-btn" onclick="copyToClipboard('${res.url}')">복사</button></td>
            `;
            listElement.appendChild(row);
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('노드 주소가 복사되었습니다: ' + text);
        });
    }

    // 초기 실행
    checkAllNodes();
</script>

</body>
</html>
