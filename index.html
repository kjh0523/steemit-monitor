<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEEM Node Monitor - Full List</title>
    <style>
        :root { --primary: #1a508b; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }
        .online { background: #d4edda; color: var(--success); }
        .offline { background: #f8d7da; color: var(--danger); }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 1em; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 STEEM 노드 통합 모니터</h1>
    <p>설정 화면의 최신 노드들을 포함하여 상태를 점검합니다.</p>
    
    <table id="node-table">
        <thead>
            <tr>
                <th>노드 주소</th>
                <th>상태</th>
                <th>지연 시간</th>
                <th>현재 블록</th>
                <th>복사</th>
            </tr>
        </thead>
        <tbody id="node-list"></tbody>
    </table>
    
    <button onclick="checkAllNodes()">새로고침 및 측정</button>
</div>

<script>
    const STEEM_NODES = [
        { url: "https://api.steemit.com" },
        { url: "https://api.moecki.online" },
        { url: "https://rpc.amarbangla.net" },
        { url: "https://api.dlike.io" },
        { url: "https://api.justyy.com" },
        { url: "https://api.pennsif.net" },
        { url: "https://api.symbionts.io" },
        { url: "https://api.steem.house" },
        { url: "https://steemd.privex.io" },
        { url: "https://anyx.io" }
    ];

    async function checkNode(node) {
        const startTime = performance.now();
        const payload = { jsonrpc: "2.0", method: "condenser_api.get_dynamic_global_properties", params: [], id: 1 };

        try {
            const response = await fetch(node.url, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'application/json' },
                signal: AbortSignal.timeout(5000)
            });
            const duration = Math.round(performance.now() - startTime);
            const data = await response.json();
            return { ...node, status: 'Online', latency: duration, block: data.result.head_block_number.toLocaleString(), class: 'online' };
        } catch (error) {
            return { ...node, status: 'Offline', latency: '∞', block: '-', class: 'offline' };
        }
    }

    async function checkAllNodes() {
        const listElement = document.getElementById('node-list');
        listElement.innerHTML = '<tr><td colspan="5">데이터 측정 중...</td></tr>';
        
        const results = await Promise.all(STEEM_NODES.map(node => checkNode(node)));
        results.sort((a, b) => (a.status === 'Online' ? 0 : 1) - (b.status === 'Online' ? 0 : 1) || a.latency - b.latency);

        listElement.innerHTML = '';
        results.forEach(res => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${res.url}</strong></td>
                <td><span class="status-badge ${res.class}">${res.status}</span></td>
                <td>${res.latency}ms</td>
                <td>${res.block}</td>
                <td><button onclick="navigator.clipboard.writeText('${res.url}');alert('복사됨!')" style="padding:5px 10px; font-size:12px;">복사</button></td>
            `;
            listElement.appendChild(row);
        });
    }
    checkAllNodes();
</script>
</body>
</html>
